services:
  user-service:
    build: ./backends/user-service
    ports:
      - "5001:5001"
    volumes:
      - ./backends/user-service:/app
    env_file:
      - ./backends/user-service/.env
    restart: unless-stopped

  document-service:
    build: ./backends/document-service
    ports:
      - "5002:5002"
    volumes:
      - ./backends/document-service:/app
    env_file:
      - ./backends/document-service/.env
    restart: unless-stopped

